<!DOCTYPE html>
<html lang="de">



<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaroon Studios</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&family=Montserrat:wght@400;700&display=swap"
    rel="stylesheet">

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background-color: #262626;

    }

    * {
      box-sizing: border-box;
    }


    body {
      font-family: 'Montserrat', Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      color: #ffffff;
    }

    .section {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .headline-section {
      background: #262626;
      height: 25vh;
      min-height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .headline-section h1 {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 3.5rem;
      margin: 0;
      letter-spacing: 2px;
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
    }


    .app-section {
      background: #F5FBE6;
      flex: 1;
    }

    .app-section .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      gap: 20px;

      height: auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .app-image {
      width: 100%;
      max-width: 600px;
      height: auto;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }



    .app-image:hover {
      transform: scale(1.02);
    }

    .play-badge img {
      width: 200px;
      transition: transform 0.3s;
    }

    .play-badge:hover img {
      transform: scale(1.05);
    }

    footer {
      background: #262626;
      height: 25vh;
      min-height: 200px;
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      text-align: left;
    }

    .footer-left {
      text-align: left;
    }

    .footer-right {
      text-align: right;
    }

    /* Footer text scaling */
    .footer-content h3 {
      margin: 0 0 6px 0;
      font-size: clamp(1rem, 2.2vh, 1.2rem);
      /* scales with viewport height */
      font-weight: 700;
    }

    .footer-content p {
      margin: 0 0 8px 0;
      font-size: clamp(0.9rem, 2vh, 1.1rem);
      /* scales with viewport height */
      line-height: 1.4;
    }

    .legal-links a {
      font-size: clamp(0.9rem, 1.8vh, 1rem);
      /* scales with viewport height */
    }

    .legal-links {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .legal-links a {
      color: #ffffff;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .legal-links a:hover {
      color: #ffde05;
      text-decoration: underline;
    }

    @media (min-width: 900px) and (max-width: 1200px) and (orientation: landscape) {
      footer {
        height: 37vh;
        min-height: 250px;
      }

      .footer-content {
        /* optional: add some extra spacing */
        gap: 20px;
      }
    }

    /* Mobile view */
    @media (max-width: 700px) {

      body {
        display: block;
      }

      .section {
        align-items: stretch;
      }

      .headline-section {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 140px;
      }

      .headline-section h1 {
        font-size: clamp(1.8rem, 7vw, 2.6rem);
      }

      .app-section {
        background: #F5FBE6;
        padding: 40px 20px;
      }

      .app-section .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        height: auto;
        padding: 0;
        box-sizing: border-box;
      }

      .app-image {
        max-width: 100%;
        height: auto;
      }

      .play-badge img {
        width: 180px;
      }

      footer {
        height: auto;
        padding: 40px 20px;
      }

      .footer-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .footer-left,
      .footer-right {
        text-align: left;
      }

      .footer-content h3 {
        margin-bottom: 12px;
      }

      .footer-content p {
        line-height: 1.6;
        margin-bottom: 14px;
      }

      .legal-links {
        gap: 10px;
      }



    }
  </style>
</head>

<body>

  <!-- Headline -->
  <section class="section headline-section">
    <div class="container">
      <h1>Jaroon Studios</h1>
    </div>
  </section>

  <!-- App Section -->
  <section class="section app-section">
    <div class="container">
      <img src="rectrush.png" alt="Rectrush App Screenshot" class="app-image" />
      <!--<a href="#" class="play-badge" aria-label="Get it on Google Play">
        <img src="play.svg" alt="Get it on Google Play" /> -->
      <div>Coming soon</div>
      </a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="section">
    <div class="container footer-content">
      <div class="footer-left">
        <h3>Kontakt</h3>
        <p>
          Jaroon Studios<br>
          Neustraße 7<br>
          66115 Saarbrücken<br>
          Deutschland
        </p>
        <p>
          E-Mail: kontakt@jaroonstudios.com<br>
          Telefon: +491778696262
        </p>
      </div>

      <div class="footer-right">
        <h3>Rechtliches</h3>
        <div class="legal-links">
          <a href="impressum.html">Impressum</a>
          <a href="datenschutz.html">Datenschutzerklärung</a>
        </div>
      </div>
    </div>
  </footer>

</body>

</html>
